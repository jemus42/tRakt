        Law is an American television legal drama series that ran for eight seasons
        on NBC from September 15, 1986, to May 19, 1994.\\n\\nCreated by Steven Bochco
        and Terry Louise Fisher, it contained many of Bochco's trademark features
        including a large number of parallel storylines, social drama and off-the-wall
        humor. It reflected the social and cultural ideologies of the 1980s and early
        1990s, and many of the cases featured on the show dealt with hot-topic issues
        such as abortion, racism, gay rights, homophobia, sexual harassment, AIDS,
        and domestic violence. The series often also reflected social tensions between
        the wealthy senior lawyer protagonists and their less well-paid junior staff.\\n\\nThe
        show was popular with audiences and critics, and won 15 Emmy Awards throughout
        its run, four of which were for Outstanding Drama Series.\",\"languages\":[\"en\"],\"subgenres\":[\"lawyer\"],\"social_ids\":{\"twitter\":null,\"facebook\":null,\"instagram\":null,\"wikipedia\":\"L.A._Law\"},\"updated_at\":\"2026-05-24T07:44:50.000Z\",\"first_aired\":\"1986-09-16T02:00:00.000Z\",\"certification\":null,\"comment_count\":1,\"total_runtime\":7856,\"aired_episodes\":171,\"original_title\":\"L.A.
