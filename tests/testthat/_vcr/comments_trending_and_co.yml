        Pitt","year":2025,"ids":{"trakt":232884,"slug":"the-pitt","tvdb":448176,"imdb":"tt31938062","tmdb":250307,"tvrage":null}},"comment":{"id":928971,"comment":"I
        loved this one. Nothing much actually happens but it ran smooth like butter.
        \r\nThe whole coming up with solutions at the beginning for the situation
        and throughout the episode, with Javadi/Ogilvie and Santos/Langdon forced
        to work together and therefore leading their complicated relationship to a
        new level. Not necessarily better, but it''s a development. And that Santos
        comment in the end kinda reframed her attitude to me: she isn''t sure she
        can trust a former addict, it''s not personal. I wonder if she was scarred
        before in that area, that would add a great layer to her as a character, to
        their dynamic, and a really interesting aspect to consider in such cases.
        \r\nWith the added McKay 9-years-sober comment. I like that she seemed quite
        judgemental at the start of season 1 but she turned out to be the opposite,
        and it could be another instance of showing support network for addiction
        cases. I don''t recall if she had much screen time with Langdon but it could
        be another dynamic to explore. A good, solid friendship bonded by shared trauma
        - like the good ole ones.\r\nHoward was a great patient and another instance
        of \"let''s learn not to judge a book by its cover\". \r\nAnd mad respect
        for Mohan (if she does) and those who''d consider going into geriatrics, gotta
        be one of the most heartbreaking ones personally","spoiler":true,"review":true,"parent_id":0,"created_at":"2026-02-27T20:31:52.000Z","updated_at":"2026-02-27T20:31:52.000Z","replies":0,"likes":7,"user_rating":9,"language":"en","user_stats":{"rating":9,"play_count":1,"completed_count":1},"user":{"username":"JoJoConejo","private":true,"deleted":false,"ids":{"slug":"jojoconejo"}}}},{"type":"episode","episode":{"season":3,"number":5,"title":"Tribal","ids":{"trakt":1002079,"tvdb":4874873,"imdb":"tt3842948","tmdb":1016902,"tvrage":null}},"show":{"title":"Banshee","year":2013,"ids":{"trakt":41522,"slug":"banshee","tvdb":259765,"imdb":"tt2017109","tmdb":41727,"tvrage":null}},"comment":{"id":716309,"comment":"Random
        thoughts as I watched this episode:\n\nHoly shit! They finally changed the
        sad chords! It only took them 25 episodes to finally play a different 4 notes
        when they want the audience to feel sad. I literally said last episode that
        I would stop watching the show if they played the sad chords one more god
        damn time.\n\nI''ve now accepted that this show is 100% satire and can''t
        be taken seriously. Sadly, I know that''s probably not true, but if it''s
        going to be this stupid then at least I can find entertainment in how stupid
        it is. It''s equally entertaining to read reviews by people who are truly
        captivated and think this is unironically a great show.\n\nAlso, if anyone
        reads this, please watch a minute of any interview or footage of the actor
        playing Chayton (the tribal chief) speaking in his normal voice. It''s hilarious.
        Like, some actors are able to pull off fake accents convincingly. But dropping
        his voice several octaves to sound tough? Holy shit, it''s just so dumb. His
        character is basically what a three year old imagines as a \"bad guy\".\n\nLastly,
        why Siobhan? Raven was the obvious choice, and/or the former nazi. As other
        reviewers mentioned, Siobhan was the only likable woman in the entire show.
        There were so many other angles they could have taken for the inevitable loss
        in this episode. With that said, I was half expecting her eyes to pop open
        at the end with how absolutely stupid this show is.","spoiler":true,"review":true,"parent_id":0,"created_at":"2024-09-25T00:17:11.000Z","updated_at":"2024-09-25T00:18:30.000Z","replies":7,"likes":1,"user_rating":null,"language":"en","user_stats":{"rating":null,"play_count":1,"completed_count":1},"user":{"username":"DNAXIII","private":true,"deleted":false,"ids":{"slug":"dnaxiii"}}}},{"type":"episode","episode":{"season":3,"number":6,"title":"Do
        Not Sleep","ids":{"trakt":5601784,"tvdb":8766165,"imdb":"tt14783590","tmdb":3273288,"tvrage":null}},"show":{"title":"Hanna","year":2019,"ids":{"trakt":142443,"slug":"hanna","tvdb":357690,"imdb":"tt6932244","tmdb":54155,"tvrage":null}},"comment":{"id":426674,"comment":"There
        were a few things that seemed iffy:\r\n\r\nThe fact that [spoiler] Marissa
        and Hanna immediately trusted Terri. [/spoiler]\r\n\r\n- I guess Hanna would''ve
        recognized her from when she was in The Meadows and because of the whole [spoiler]
        \"texting the trainees their orders as the mother/father\" thing. [/spoiler]
        She would also know [spoiler] Terri''s on their side by how she helped [/spoiler]
        in three instances:\r\n\r\nWhen she [spoiler] texted Hanna about Sandy; and
        how she''s back to her tricks [/spoiler] in the premiere.\r\n\r\n[spoiler]
        Warning Hanna that Pioneer knows about her and Marissa [/spoiler] in the second
        episode.\r\n\r\nWhen asked by [spoiler] Hanna for Sandy''s location at the
        end of the third episode, she told Hanna. [/spoiler]\r\n\r\n- As for Marissa,
        because of what [spoiler] Charmichael texted her in the second episode, she
        knows someone in Pioneer could be on their side. [/spoiler] But, come on.
        She wouldn''t have known it [spoiler] was Terri, let alone that the person
        who showed up in front of them was Terri. [/spoiler]\r\n\r\nThen again, as
        far as the latter is concerned, Marissa [spoiler] knew her name; she said
        it in the car with her. [/spoiler] As much as I seem to jump to the assumption
        of plot convenience, they may have met in the second season. But I don''t
        remember at all.\r\n\r\nNo matter how you spin it, [spoiler] Hanna and Marissa,
        trusting Terri immediately: was stretching it a little too much. [/spoiler]
        At the very least, there should have been some hesitancy involved.\r\n\r\nThe
        Chairman, going [spoiler] out in the field himself. [/spoiler] Of course,
        we all know why, writing-wise. But that was still iffy.\r\n\r\nTerri, being
        the one to [spoiler] bring the message to Ethan. [/spoiler] For all Marissa
        knew, Terri could''ve [spoiler] been playing her. [/spoiler] That was a dumb
        move, but we know the reasoning behind it, writing-wise. Still iffy.\r\n\r\n[spoiler]
        Sandy''s death. [/spoiler]\r\n\r\n- I don''t get why the writers [spoiler]
        had her killed. [/spoiler] It''s like they hinted at this rivalry between
        her and Hanna at the start of the season, making you think that they''ll face
        off and [spoiler] it''ll end in her death. [/spoiler] That happened two times,
        yet she [spoiler] survived the first one, making you think she''ll end up
        dying in the next one. [/spoiler] Which [spoiler] she did, but Hanna didn''t
        do it. [/spoiler]\r\n\r\n- There was the slow build of Sandy''s [spoiler]
        mental and emotional state from killing Anne, reaching the point of hallucinating
        her. [/spoiler] The writers made a point of showing all of that, yet it''s
        like none of it mattered. If it did, Sandy [spoiler] wouldn''t have raised
        her gun. [/spoiler]\r\n\r\n- So, either my theory is correct: that Sandy [spoiler]
        wanted to die so she wouldn''t have to live with the haunting guilt of killing
        Anne and her unborn child, or the writers killed her for no reason, besides
        maybe wanting all three \"bad guys\" (her, The Chairman, and Brianna) to be
        dead. [/spoiler]\r\n\r\nAnd lastly, the reason for [spoiler] Marissa''s death.
        [/spoiler] It seems like the best writing for how [spoiler] Marissa will get
        shot [/spoiler] that the writers came up with was for her to be dumb and try
        picking up the radio. I guess [spoiler] shooting The Chairman first and then
        picking up the radio was too much to ask: huh, Marissa? [/spoiler] Embarrassing.\r\n\r\nBut,
        as expected: this series finale was bittersweet. For me, there were two or
        three reasons for that:\r\n\r\n[spoiler] Marissa''s death. [/spoiler] I''m
        not sure if it was predictable for other people. But I was expecting it to
        happen. There were feelings of [spoiler] death flags for her throughout the
        season. [/spoiler] And the title of this final episode also gave off the impression
        that [spoiler] she''ll die, or someone will. [/spoiler]\r\n\r\n- [spoiler]
        Her death was bittersweet. [/spoiler] I thought she was one of the top characters
        in this show. Especially in this final season, alongside John Charmichael.
        And while I think [spoiler] her death, as bittersweet as it was, added more
        to this series finale than it would''ve had without it, I''m also disappointed.
        [/spoiler] Just like I was with [spoiler] Charmichael''s death. [/spoiler]
        But it is what it is.\r\n\r\nThe ending. Yeah, it was a \"happy ending,\"
        so to speak. [spoiler] Hanna, Abbas, and Nadiya were all fine. [/spoiler]
        [spoiler] None of them died. [/spoiler] But the fact that Hanna [spoiler]
        left by herself, and wasn''t able to be together with Abbas, at least for
        a certain amount of time, was bittersweet. [/spoiler]\r\n\r\nAnd the third
        reason wasn''t as prominent as the first two, but I''ll include it anyway:
        [spoiler] Sandy''s death. [/spoiler] Most people probably ended up hating
        her in this season if they didn''t already and likely glad that [spoiler]
        she \"got her comeuppance.\" [/spoiler]\r\n\r\n- I thought she was more likable
        in the second season. And I thought Jules was a little dislikable. In my review
        of this season''s premiere, I entertained the possibility that those roles
        will switch in this final season because I thought Jules was more likable,
        while Sandy was a little dislikable.\r\n\r\n- And it did, somewhat, so I can
        understand why people may have begun hating Sandy and [spoiler] wanting her
        to die. [/spoiler] But while I didn''t like her in this season as much as
        I did in the second season, and she got on my nerves a little bit, [spoiler]
        her death was bittersweet. [/spoiler]\r\n\r\nI find it interesting how this
        series finale, as the season finale of the second season, was the most decent
        episode of the entire season. In this case, I think it''s even better because
        this is the series finale and not the season finale.\r\n\r\nEven though there
        were things that I thought were a little iffy or was disappointed by, this
        series finale was a decent end to the show. As much as I thought this show
        was underwhelming and not as good as it could''ve been, as well as being sarcastic
        about certain things that were convenient or ridiculous, I''ll miss this show.
        It was entertaining enough.","spoiler":false,"review":true,"parent_id":0,"created_at":"2021-12-11T19:57:16.000Z","updated_at":"2021-12-11T19:57:16.000Z","replies":8,"likes":5,"user_rating":7,"language":"en","user_stats":{"rating":7,"play_count":3,"completed_count":1},"user":{"username":"LegendaryFang56","private":false,"deleted":false,"name":"Lineage","vip":false,"vip_ep":false,"director":false,"ids":{"slug":"legendaryfang56"}}}},{"type":"episode","episode":{"season":3,"number":3,"title":"D-Day","ids":{"trakt":13642176,"tvdb":11413552,"imdb":"tt37532358","tmdb":6617354,"tvrage":null}},"show":{"title":"Shrinking","year":2023,"ids":{"trakt":189764,"slug":"shrinking","tvdb":411364,"imdb":"tt15677150","tmdb":136311,"tvrage":null}},"comment":{"id":922489,"comment":"Let''s
        see what we got this week.\r\n\r\n- Jeff Daniels and the dinner were nice\r\n-
        Brian lines and singing at the store was cringe\r\n- Gaby: \"... at that gorgeous
        woman with all those curves and lashes like butterfly wings\". Let''s recall
        that she''s only seen her lashing out at Jorge at his workplace. But it''s
