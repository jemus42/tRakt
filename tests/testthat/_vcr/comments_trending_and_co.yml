        overrated.\\r\\n\\r\\nThis is basically just a Nancy Drew, Veronica Mars style
        murder mystery, but placed in a supernatural school.\\r\\n\\r\\nIf you're
        a 30-40-something year old looking to revisit the Addams Family for some creepy
        capers and what-not. This isn't for you. This is written for alt-teens who
        grew up on Disney Channel movies and are now at the point in life where they
        are trying to rebel. The only thing here for the older crowd is Christina
        Ricci popping up in a new role.\\r\\n\\r\\nThe show is entirely predictable
        from the moment the \\\"Hyde\\\" (monster) is introduced. Ask yourself, why
        are certain character 1 and 2 so prominent in the story? What are they seriously
        offering?... Oh, it's because they're the bad guy and whoever are the bad
        guys at the start obviously won't end up being so. There are zero surprises
        here.\\r\\n\\r\\nDespite the world it's set in, werewolves, sirens etc., it's
        entirely unimaginative and lacking in any real depth. Wednesday is just a
        15/16 year old kid trying to be a detective and sticking her nose in where
        she has no business. Everyone keeps telling her to go away and stop and she
        is just annoying as anything. She also just isn't creepy and at all threatening
        like Christina Ricci was in the 90s. Jenna Ortega seems to act like she's
        watched one too many movies of Hollywood depicting an autistic kid and rolled
        it all into one reclusive bundle. It doesn't help that the script is bad and
        cheesey to be fair to her but again, she's just a kid devoid of giving a crap...
        with some one liners thrown in to make her sound like she's threatening or
        creepy here and there just to remind you she's Wednesday Addams and not Veronica
        Mars.\\r\\n\\r\\nI fell asleep three times trying to watch through some of
        the middle episodes.\\r\\n\\r\\nOh... and the CGI on the Hyde monster. HORRIBLE.
        So cartoon. If you want to be reminded \\\"this is definitely not realistic\\\",
