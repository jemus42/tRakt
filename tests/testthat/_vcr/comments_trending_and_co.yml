      string: '[{"type":"show","show":{"title":"Jazz","year":2001,"ids":{"trakt":20765,"slug":"jazz","tvdb":80679,"imdb":"tt0221300","tmdb":20861,"tvrage":null}},"comment":{"id":657653,"comment":"Jazz
        is a noble attempt to be the defining documentary about jazz, “America’s art
        music” and one of the greatest things to happen in human history, in my humble
        opinion.\r\n\r\nBurns has assembled his usual materials – pictures, quotes,
        historians, contemporary music – to go along with video clips and reminiscences
        due to the fact that much of this music was performed when it could be recorded
        either by audio alone or by audio and film.\r\n\r\nAnd it should be commended
        that the tried to do this, just like Burns should be commended for his other
        long-form documentary projects. But this film is not the story of jazz.\r\n\r\nRather
        it is a biased and inaccurate account that is ultimately a failure as a history
        of jazz, and so a failure as a film. It is an excellent history of jazz prior
        to about 1950, and if that was its stated goal, we would have another excellent
        Burns documentary.\r\n\r\nInstead we get typical Wynton Marsalis conservatism
        that is opposed to everything that is great about jazz. (And this isn’t necessarily
        a criticism of Marsalis himself, as he is an excellent educator – I can tell
        that by his interviews. But he is horribly wrong about what jazz is and isn’t.)\r\n\r\nThis
        film is something like 19 hours long, and barely makes room for anything post-bop.
        These conservative types are the worst: they idolize Bird and Diz for how
        they broke with tradition but hate late period Miles or late period Trane,
        or hate Ayler for the same reasons. And of course they totally ignore the
        Europeans post Reinhardt as if European jazz had barely happened at all.\r\n\r\nHere
        are some of their various crimes:\r\n\r\nMonk is ignored until near the end
        and when they do eventually discuss him its partly to talk about how he was
        ignored.\r\nBud Powell barely gets any time.\r\nThey spend something like
        90 seconds on Mulligan’s piano-less quartet.\r\nBrubeck gets some time, but
        hardly as much as you might think given the revolutionary nature of the one
        recording of his they actually acknowledge.\r\nDavis gets more attention than
        anyone else post-Bird but Davis should get similar amounts of time to Armstrong
        and Ellington and yet the first 15 hours or so are dedicated primarily to
        Armstrong, followed by Ellington – Ellington is not mentioned in the earliest
        segments – and Miles gets major sections of the last few episodes and that
        is all.\r\nSpeaking of Davis, when he did cool jazz, apparently it was cool,
        but when other people did it, not so much – now I don’t particularly enjoy
        cool, but they don’t really provide any reason for their opinions and they
        shouldn’t ignore the fact that cool jazz has been as popular as bop post-war.\r\nWhat
        was with that brief, horrible “history” of rock and roll? It was all of 90
        seconds and seemed to imply that Ray Charles invented it and Elvis made it
        popular. Um, right…\r\nTrane’s free jazz phase is ignored altogether until
        the final episode and Coleman gets what feels like 10 minutes.\r\nIn the last
        episode, when they list contemporary styles of jazz they omit fusion entirely
        and then later fusion is dismissed as Miles’ attempt to make money, even though
        if they had actually paid any attention to history, they would know he wasn’t
        even the first fusion musician. (This is the most egregious error of the entire
        program. They insist that Miles only embraced fusion because of his experiences
        at the 1969 Newport Jazz Festival but this is idiotic and easily fact-checked:
        Miles’ first fusion album – not the first ever – was released in July of 1969,
        probably prior to the festival, which I believe usually takes place in August.
        Moreover it was recorded in February, i.e. half a year before the festival.
        Also the idiots keep calling the instruments used in Fusion “electronic” as
        if an electric guitar or bass is “electronic.”)\r\nApparently, because Armstrong
        sang pop tunes that were hits during the British invasion, we should care
        more about his ’60s work than, say, Miles’ work of the same period, which
        is basically the embodiment of the “When I was younger things were better”
        conservatism that ruins this series.\r\nThe brief amount of time they give
        Mingus is almost entirely dedicated towards his social comment, and not his
        actual music.\r\nThe Art Ensemble of Chicago gets only a few minutes.\r\nThey
        and Taylor are pretty much the only people who are addressed in Free post-Coleman,
        and Taylor gets some flak because apparently he’s just too difficult to bother
        with. (And the same people who accuse Taylor of being too difficult accuse
        Miles of pandering…)\r\nHancock is discussed as as sideman only.\r\nThe film
        completely ignores the following genres (only the ones I can think of off
        the top of my head):\r\n\r\nChamber jazz;\r\nECM;\r\nFusion (the modern variants
        with alternative rock and hip hop);\r\nKlezmer jazz;\r\nModern creative;\r\nAnd
        no doubt many more.\r\nThe documentary further  omits or barely acknowledges
        many important jazz artists, here are only a few:\r\n\r\nChet Baker (mentioned
        only in passing);\r\nAnthony Braxton;\r\nDon Cherry (mentioned only as a member
        of Coleman’s quartet);\r\nSteve Coleman (mentioned only in passing, shockingly
        as someone we should listen to);\r\nChick Corea;\r\nEric Dolphy;\r\nEvery
        single European jazz musician post-Reinhardt and every other international
        jazz performer;\r\nEvery post-Miles fusion performer;\r\nAhmad Jamal (mentioned
        only in passing);\r\nKeith Jarrett (mentioned only in passing and only in
        relation to Art Blakey – can you imagine thinking Keith Jarrett is only worth
        knowing as a sideman to Art Blakey?!?!?);\r\nRoland Kirk;\r\nWes Montgomery
        and every single post-Charlie Christian jazz guitarist save one I didn’t know
        (who is mentioned in passing) – that’s right, the guitar as a jazz instrument
        is ignored from the 1940s onward;\r\nLee Morgan (mentioned only in passing);\r\nBud
        Powell (mentioned briefly);\r\nEvery major jazz vocalist post-Fitzgerald (though
        a couple are shown as interviews and Cassandra Wilson gets a sentence);\r\nJohn
        Zorn;\r\nAnd numerous others I am forgetting – I apologize but I haven’t set
        out to write a definitive history here, I was just attempting to watch one.\r\nSupposedly
        many of these people aren’t mentioned or barely mentioned because they helped
        kill jazz. Clubs closed and people stopped listening because of too much innovation.\r\n\r\nAnd
        who will safe us from the poverty of self-indulgent free jazz and pandering
        fusion? Why, it’s Wynton Marsalis, the same guy who we’ve been listening to
        for 18+ hours. Talk about self-serving… I mean, I don’t know what Burns was
        thinking but the final hour of this film is practically an advertisement for
        Wynton and his despicable conservatism. I mean, how can these guys seriously
        let him say this shit? Your lead interviewee is also the person who “saved”
        jazz? And you don’t question this? Unbelievable.\r\n\r\nAnd then they give
        us a list of the people we should be listening to, multiple of whom had participated
        in the program as interviewees. Thanks, I’ll be sure to listen to these people
        who are apparently so much better than everyone ignored, who all actually
        have reputations and make great music.\r\n\r\nBut I’ll give them one thing:
        At least they have Artie Shaw talking about how much he hated Glenn Miller.
        That part was awesome.\r\n\r\nIf you want a history of the first decades of
        jazz, watch this. If you want a history of jazz, read a book, such as Alyn
        Shipton’s excellent history.\r\n\r\nI really wanted to give this a 3 or lower,
        however the first 8 episodes are a near-excellent history of jazz in the first
        half of the 20th century, and so that is why I am being kind and giving it
        a 4.","spoiler":true,"review":true,"parent_id":0,"created_at":"2024-03-24T21:20:50.000Z","updated_at":"2024-03-24T21:20:50.000Z","replies":13,"likes":0,"user_rating":4,"language":"en","user_stats":{"rating":4,"play_count":10,"completed_count":10},"user":{"username":"rnhaas","private":false,"deleted":false,"name":"rnhaas","vip":false,"vip_ep":false,"director":false,"ids":{"slug":"rnhaas"}}}},{"type":"episode","episode":{"season":28,"number":3,"title":"Sora
        Not Sorry","ids":{"trakt":13352067,"tvdb":11256177,"imdb":"tt38043392","tmdb":6606755,"tvrage":null}},"show":{"title":"South
        Park","year":1997,"ids":{"trakt":2177,"slug":"south-park","tvdb":75897,"imdb":"tt0121955","tmdb":2190,"tvrage":null}},"comment":{"id":885289,"comment":"[6.8/10]
        Let’s start with this. *South Park* is a pretty gross show by nature. Blood
        and poo and other bodily fluids are basically table stakes for a series that
        began its ascendance due to quickly finding a place in young edgelords’ hearts.
        Trey Stone and Matt Parker practically reveled in it.\r\n\r\nAnd yet, somehow,
        “Sora Not Sorry”’s depiction of Trump and Vance bumping uglies may be the
        grossest thing to ever blight the face of *South Park*. Even seeing “Mrs.
        Garrison” in flagrante is somehow less disgusting than this. So, I don’t know,
        kudos to the show’s creative team for setting new standards nearly three decades
        after the show’s debut?\r\n\r\nAll that aside, this episode is a mixed bag.
        I appreciate Parker and company tackling something as in the moment as generative
        AI videos and the problems they can cause. But this feels like a jumble of
        stray thoughts and ideas on the topic rather than a fully-formed or coherent
        take on them.\r\n\r\nThere’s a few laughs to be had. For whatever reason,
        the funniest part of this one for me is Peter Thiel’s hastily made A.I. videos
        of Cartman that having him reflexively spouting his early season catchphrases
        (and often making a hash of them) despite Mrs. Cartman completely buying the
        routine. And while the business of seeing classic cartoon characters commit
        acts of grotesquery gets tired fast, it’s also funny to see how Sergeant Yates
        and the other South Park cops are completely confounded by the situation and
        take A.I. to be real.\r\n\r\nThere’s something to be said for grown-ups in
        general not intuitively being able to distinguish this stuff. It’s cosmically
        funny when Yates and his men completely misunderstand the situation in a ridiculous
        way and still somehow stumble into rescuing Cartman based on the wrong theory.
        But there’s also commentary about the danger of how this stuff can mislead
        people, even and perhaps especially people with power.\r\n\r\nOtherwise, though,
        this episode mostly shambles along, riffing on these ideas without really
        nailing them down. You can kind of see the loose threads between the goings
        on at the White House and the feud between the boys and Red at South Park
        Elementary and Peter Thiel faking proof of life videos of Cartman. For the
        most, though, it’s just a mishmash of half-formed gags and concepts without
        a clear throughline. (And the less said about the caricatured Japanese voices
        from the Studio Ghibli execs at this point, the better.)\r\n\r\nStill, the
        strongest point the episode makes comes at the end. Many of the characters
        comment on the intrusive power of these videos, and the way they can make
        people do things they didn’t consent to. The episode plays it for laughs,
        but also repeats the line enough for it to seem like part of Parker and company’s
        genuine objection.\r\n\r\nBut what’s truly interesting is the reverse, where
        Trump and Vance are caught doing the deed and dismiss it all as an A.I. fabrication.
        The greater danger is not just the horrid acts of revenge porn or even ridiculous
        videos generated for yuks. It’s in breaking down people’s ability to know
        and understand what’s real. When the actual Trump is destroying trade relationships
        with Canada over real videos of Ronald Reagan that he claims are false, it’s
        hard not to see the perils in someone being able to dismiss even video evidence
        of their misdeeds as phony in an age where people regularly fake such things.
        God only knows what other evidence he and other malcontents might try to handwave
        away on those terms.\r\n\r\nThis episode isn’t the best vehicle for those
        ideas, with a hodgepodge of bits and points that never quite coalesce into
        a whole. But when using that “fake news” excuse to let the world write off
        arguably the grossest thing *South Park* has ever produced, well, the point
        is made.","spoiler":true,"review":true,"parent_id":0,"created_at":"2025-11-13T22:02:48.000Z","updated_at":"2025-11-13T22:02:48.000Z","replies":0,"likes":10,"user_rating":7,"language":"en","user_stats":{"rating":7,"play_count":1,"completed_count":1},"user":{"username":"AndrewBloom","private":false,"deleted":false,"name":"Andrew
        Bloom","vip":true,"vip_ep":false,"director":false,"ids":{"slug":"andrewbloom"}}}},{"type":"episode","episode":{"season":2,"number":8,"title":"2:00
