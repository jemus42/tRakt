        Years Later: The Bone Temple","year":2026,"ids":{"trakt":1033738,"slug":"28-years-later-the-bone-temple-2026","imdb":"tt32141377","tmdb":1272837}},"comment":{"id":911396,"comment":"This
        is easily the best movie in the franchise.\n\nI so wished I started off 2026
        with this movie as man it was fucking Insane. I literally loved every single
        thing about this film and it’s hands down my favourite movie of the franchise,
        which goes to show how good it is really as every film so far has been pretty
        damm awesome…. yes even 28 weeks later which in my opinion is extremely underrated.\n\nThe
        story was fantastic and I like how it focused a lot more on Dr Ian Kelson’s
        character, with him trying to tame a zombie, yeah I know how mad that sounds
        as I never actually thought that was possible until now but it happened, he
        did in fact tame a freaking zombie and it was so awesome. I actually didn’t
        think I’d like that idea as it is a little silly, but it honestly worked for
        me and I just loved seeing Ian and Samson having a super fun time together.
        It made me so happy. I thought Samson was so badass too.\n\nI find it pretty
        funny how the zombies ain’t even the real threat here, it’s a bloody gang
        of Jimmy Savile’s and let me tell you, they were way more scary and super
        gross than any freaking zombie as they were absolute psychopaths and were
        so messed up in the head, especially the leader, Jimmy Crystal as he was the
        worst Jimmy of the lot. He was just insane and I’m so glad he got what was
        coming to him. It was such a satisfying death.\n\nThe ending gave me so many
        goosebumps as it has to be one of the best endings I have seen in such a long
        time. It was absolutely amazing and so much happened, like Dr Ian Kelson’s
        insanely beast and badass Iron Maiden performance, the satisfying death of
        Jimmy Crystal and of course the surprise cameo from Cillian Murphy coming
        back as Jim which was so crazy, I seriously can’t wait for the next film now
        as it’s going to be just absolutely insane at this point.\n\nI know I’ve mentioned
        it a couple times now but I’ve gotta mention again about how badass that Iron
        Maiden scene was as it was literally so cool and is easily my favourite part
        of the movie. It was pure freaking gold, I absolutely loved it and I wanna
        watch it again so badly. The Number Of The Beast has automatically been added
        to one of my rock playlists now. Rock on Voldermort!!.\n\nI can’t really express
        enough about how much I adored this film as it was absolute cinema in my opinion
        and I seriously can’t see many films this year beating it. What an awesome
        movie and of course it’s getting a 10. Hell yeah.\n\n10/10","spoiler":true,"review":true,"parent_id":0,"created_at":"2026-01-16T01:03:12.000Z","updated_at":"2026-01-16T01:07:08.000Z","replies":6,"likes":23,"user_rating":10,"language":"en","user_stats":{"rating":10,"play_count":2,"completed_count":1},"user":{"username":"Biscuitjack","private":false,"deleted":false,"name":"Biscuitjack","vip":true,"vip_ep":false,"director":false,"ids":{"slug":"biscuitjack"}}}}]'
