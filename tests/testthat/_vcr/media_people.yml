        Brian Ury (born September 30, 1973) is an American actor, stand-up comedian,
        YouTuber, and Japanese translation specialist.\n\nUry was born and raised
        in Sonoma, California. He graduated from Sonoma Valley High School, where
        he acted in theatre productions. He earned a bachelor''s degree in linguistics
        at Evergreen State College in Olympia, Washington and studied abroad in Japan,
        where he became fluent in Japanese. Ury is a descendant of German Jewish impressionist
        painter Lesser Ury.\n\nSince studying abroad in Tokyo, Ury and has worked
        as a translator in film, television, and manga and currently (As of May 2011)
        translates and writes English adaptations for manga. Ury moved to Los Angeles
        in August 2001 where he began performing stand-up comedy. Cartoonist Keith
        Knight, a neighbor of his, described Ury''s acting career as \"Spooge man\"
        and \"a cavalcade of reprobates, sleazeballs, derelicts, & weirdos.\"\n\nUry
        has made several film and television appearances, including an episode of
        Tim Kring''s Crossing Jordan and in Shoot ''Em Up. He also appeared in Heroes,
        Malcolm in the Middle, Life, Without a Trace, Breaking Bad, Better Call Saul,
        Zeke and Luther, and The Librarians. In March 2015, Ury was cast for Rob Zombie''s
        slasher film 31 as Schizo-Head. A character actor, Ury has died on screen
        in almost every role he has portrayed.\n\nUry also has several YouTube channels/accounts/personalities
        and alter-egos, which include Karaoke Steve and Ken Tanaka, the fictional
        adopted twin brother of David Ury. Tanaka is described as an Ashkenazi Jewish
        man adopted as an infant by Japanese parents Hideo and Mari Tanaka, and raised
        in Shimane Prefecture of Japan; he returns to Los Angeles to find his birth
        parents Jonathan and Linda Smith.","birthplace":null,"social_ids":{"twitter":"isthisdavidury","facebook":null,"instagram":"davidury","wikipedia":"David_Ury"},"updated_at":"2026-05-24T08:36:20.000Z","known_for_department":"acting"},"images":{"headshot":["media.trakt.tv/images/people/000/475/153/headshots/medium/72164bd276.jpg.webp"]},"episode_count":2,"order":524},{"character":"Spooge''s
