        is best known for playing car wash owner Bogdan Wolynetz in the AMC television
        series Breaking Bad.\n\nIn 1986, Stan earned a Bachelor of Science degree
        in physics from the University of Bucharest. In 1997, he earned a PhD in chemistry
        from the Institute of Physical Chemistry of the Romanian Academy.\n\nStan
        was a scientist at the Los Alamos National Laboratory in Los Alamos, New Mexico
        before moving on to the Argonne National Laboratory, a national research laboratory
        jointly operated by the University of Chicago and Department of Energy, in
        2010. From 2013 to 2015, Stan served in the Office of Nuclear Energy within
        the United States Department of Energy. Stan is also a writer of short fiction
        and poetry.\n\nStan was living in Albuquerque, New Mexico during the filming
        of the first season of AMC''s Breaking Bad. His two children hoped to be extras
