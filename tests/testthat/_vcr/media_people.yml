        Peete Rose Jr. (born January 5, 1942) is an American journalist and talk show
        host. From 1991 to 2017, he was the host and executive producer of the talk
        show Charlie Rose on PBS and Bloomberg LP. On the show, he interviewed writers,
        politicians, athletes, entertainers, businesspersons, leaders, scientists,
        intellectuals, and fellow journalists. The show was known for its distinguished
        stature and intellectual tone.\n\nRose also co-anchored CBS This Morning from
        2012 to 2017 alongside Gayle King and Norah O''Donnell, where he interviewed
        many celebrities, institutional leaders, and political figures. Rose formerly
        substituted for the anchor of the CBS Evening News. In 2012, Rose, along with
        Lara Logan, hosted the revived CBS classic Person to Person, a news program
        during which celebrities are interviewed in their homes, originally hosted
        from 1953 to 1961 by Edward R. Murrow. Since 2022, Rose has hosted the online
        interviews Charlie Rose Conversations on his personal website.[4][5][6] Rose
        occasionally appeared in films and television shows including Breaking Bad
        and House of Cards.\n\nIn November 2017, Rose was fired from PBS, Bloomberg,
        and CBS after The Washington Post published multiple in-house allegations
        of sexual misconduct from the late 1990s to 2011. Rose responded to those
        allegations by admitting to having behaved insensitively at times but did
        not believe that all of the allegations were accurate, and later suggested
        women were exploiting the #MeToo campaign. The allegations led to Rose being
        stripped of several awards and honors. In November 2024, the sexual harassment
        lawsuit ended with a settlement in which the plaintiffs acknowledged there
        was no ill intent on the part of Rose for his conduct.\n\nDescription above
