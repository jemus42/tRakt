        Lee Cranston (born March 7, 1956) is an American actor. After taking minor
        roles in television, he established himself as a leading actor in both comedic
        and dramatic works on stage and screen. He has received several accolades,
        including seven Primetime Emmy Awards, a Golden Globe Award, a Laurence Olivier
        Award, and two Tony Awards, as well as nominations for an Academy Award and
        a BAFTA Award.\n\nCranston first gained prominence playing Hal in the Fox sitcom Malcolm
        in the Middle (2000–2006), for which he was nominated for the Primetime Emmy
        Award for Outstanding Supporting Actor in a Comedy Series. He gained stardom
        for his dramatic leading role playing Walter White in the AMC crime drama
        series Breaking Bad (2008–2013), for which he won the Outstanding Lead Actor
        in a Drama Series four times (2008, 2009, 2010, and 2014). He was Emmy-nominated
        for All the Way (2016) and Curb Your Enthusiasm (2018). Cranston co-developed
        and appeared in the crime drama series Sneaky Pete (2015–2019), and has also
        starred in the drama series Your Honor (2020–2023).\n\nOn stage, he earned
        a Tony Award for Best Actor in a Play for his portrayal of President Lyndon
