        stunt coordinators and second unit directors, working specifically with \"Smoking
        Aces\" Joe Carnahan and \"Silver Linings Playbook\" David O Russell. After
        twenty five plus years in the industry and over one hundred fifty film and
        tv credits, Mr Bray made his television directorial debut in 2015 with Katie
        Heigl''s tv series \"State of Affairs\" for NBC/Universal, he then went on
        to direct episodes for Fox/Bruckheimer, CW/Greg Berlanti and ABC/Freeform.
