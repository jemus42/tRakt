        W. Smith is an American animation supervisor at Digital Domain. He began working
        in digital animation in the mid-1990s, contributing as an animator to early
        large-scale visual effects productions such as The Legend of Galgameth (1996)
        and Titanic (1997). He continued to animate on studio productions including Lake
        Placid (1999), Harry Potter and the Philosopher''s Stone (2001), The Matrix
        Reloaded (2003), and Spider-Man 2 (2004).\n\nThroughout the 2000s, Smith advanced
        into senior and lead animation roles on high-profile films, including The
        Chronicles of Narnia: The Lion, the Witch and the Wardrobe (2005), Superman
        Returns (2006), Beowulf (2007), Watchmen (2009), Alice in Wonderland (2010),
        and Men in Black³ (2012).\n\nFrom the 2010s onward, Smith increasingly served
        in leadership positions, including lead animator and animation supervisor
        roles on major franchise films and episodic television. He was the lead animator
        on Edge of Tomorrow (2014), Avengers: Infinity War (2018), and Ant-Man and
        the Wasp: Quantumania (2023), and held senior animation roles on series such
        as The Mandalorian (2019), WandaVision (2021), Ms. Marvel (2022), and Lost
        in Space (2018), and Agatha All Along (2024).\n\nSmith later served as animation
        supervisor and animation lead on projects such as Creation of the Gods II:
        Demon Force (2025) and Thunderbolts (2025).\n\nHis industry recognition includes
        nominations from the Visual Effects Society Awards: a 2008 nomination for
        Outstanding Performance by an Animated Character in an Animated Motion Picture
        for Beowulf (2007), and a 2010 nomination for Outstanding Animated Character
        in a Live Action Feature Motion Picture for Doctor Manhattan in Watchmen (2009),
        shared with fellow Digital Domain artists.","birthplace":null,"social_ids":{"twitter":null,"facebook":null,"instagram":null,"wikipedia":null},"updated_at":"2025-12-28T08:22:39.000Z","known_for_department":"visual
