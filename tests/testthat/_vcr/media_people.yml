        \"Canadapool.\" His involvement in the X-Men franchise is equally notable,
        having doubled for actors like Nicholas Hoult and Adan Canto in X-Men: Days
        of Future Past (2014), X-Men: Apocalypse (2016), and Dark Phoenix (2019),
        where he also acted as a fight coordinator. He also worked on Netflix''s The
