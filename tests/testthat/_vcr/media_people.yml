        Godley (born 22 July 1964) is a British actor. He has been nominated for two
        Tony Awards and four Laurence Olivier Awards for his performances on the New
        York and London stages which include, Private Lives in 2001, The Pillowman
        in 2002, Anything Goes in 2011, and The Lehman Trilogy in 2019. He made his
        Broadway debut in 2002 in a revival of Noël Coward''s Private Lives for which
        he earned a Theatre World Award for Outstanding Broadway debut. In 2011 he
        returned to Broadway in the musical Anything Goes for which he earned a Tony
        Award for Best Featured Actor in a Musical nomination. In 2021, The Lehman
        Trilogy made its Broadway transfer to great critical acclaim, and securing
        Godley another Tony nomination for Best Actor in a Play.\n\nHis film roles
        include Love Actually (2003), Nanny McPhee (2005), Charlie and the Chocolate
        Factory (2005), Elizabeth The Golden Age (2007) and The Theory Of Everything
        (2014). He has also had recurring roles as Elliot Schwartz in AMC''s Breaking
