      string: '{"cast":[{"character":"Wade Wilson / Deadpool","characters":["Wade
        Wilson","Deadpool"],"person":{"ids":{"imdb":"nm0005351","slug":"ryan-reynolds","tmdb":10859,"trakt":416707},"name":"Ryan
        Reynolds","death":null,"gender":"male","height":187.9600067138672,"images":{"fanart":["media.trakt.tv/images/people/000/416/707/fanarts/medium/fb20e4ad8d.jpg.webp"],"headshot":["media.trakt.tv/images/people/000/416/707/headshots/medium/586ee5c00e.jpg.webp"]},"birthday":"1976-10-23","homepage":null,"biography":"Ryan
        Rodney Reynolds (born October 23, 1976) is a Canadian and American actor,
        entrepreneur and film producer. Known for starring in comedicand superhero
        films, he was the world''s second-highest-paid actor in 2020 and 2024. Reynolds
        has received numerous accolades, including two Primetime Emmy Awards, as well
        as nominations for two Grammy Awards and a Golden Globe Award. His films as
        a leading actor have grossed $6.6 billion worldwide.\n\nBorn and raised in Vancouver,
        Canada, Reynolds began acting at the age of thirteen, taking on small roles
        in various television series. He had his first lead role in the teen soap
        opera Hillside (1991–1993), then played the lead role in the sitcom Two Guys
        and a Girl (1998–2001). Reynolds later starred in a range of films, including
        the commercially successful romantic comedies National Lampoon''s Van Wilder (2002), Waiting...
        (2005), and The Proposal (2009), the critically unsuccessful superhero films Blade:
        Trinity (2004), X-Men Origins: Wolverine (2009), and Green Lantern (2011),
        and the biographical drama Woman in Gold (2015).\n\nReynolds achieved his
        greatest commercial success as the titular character in the Deadpool franchise,
        starring in Deadpool (2016), Deadpool 2 (2018), and Deadpool & Wolverine (2024).
        His performance in the first received a Golden Globe nomination, while the
        latter emerged as his highest-grossing release. He has since appeared in the
        sci-fi horror Life (2017), and action films like 6 Underground (2019), Free
        Guy (2021), and The Adam Project (2022). Reynolds has also lent his voice
        to animated films, including The Croods franchise (2013–2020), Turbo (2013),
        and the animated character Pikachu in Detective Pikachu (2019).\n\nIn 2017, Time included
        Reynolds in its list of the 100 most influential people in the world. He was
        named People''s Sexiest Man Alive in 2010 and was awarded a star on the Hollywood
        Walk of Fame in 2017. A businessman, he holds an ownership stake in Mint Mobile and
        is a co-owner of Welsh soccer club Wrexham; the latter is documented in the Emmy
        Award-winning television series Welcome to Wrexham (2022–present). Divorced
        from actress Scarlett Johansson, Reynolds has been married to Blake Lively since
        2012; he has four children with the latter.\n\nDescription above from the
        Wikipedia article Ryan Reynolds, licensed under CC-BY-SA, full list of contributors
        on Wikipedia.","birthplace":"Vancouver, British Columbia, Canada","social_ids":{"twitter":"VancityReynolds","facebook":"VancityReynolds","instagram":"vancityreynolds","wikipedia":"Ryan_Reynolds"},"updated_at":"2026-05-22T18:51:21.000Z","known_for_department":"acting"},"images":{"headshot":["media.trakt.tv/images/people/000/416/707/headshots/medium/586ee5c00e.jpg.webp"]}},{"character":"Vanessa","characters":["Vanessa"],"person":{"ids":{"imdb":"nm1072555","slug":"morena-baccarin","tmdb":54882,"trakt":431157},"name":"Morena
        Baccarin","death":null,"gender":"female","height":171.4499969482422,"images":{"fanart":["media.trakt.tv/images/people/000/431/157/fanarts/medium/a1cdcc8720.jpg.webp"],"headshot":["media.trakt.tv/images/people/000/431/157/headshots/medium/a8a248e9ed.jpg.webp"]},"birthday":"1979-06-02","homepage":null,"biography":"Morena
        Baccarin (born June 2, 1979) is a Brazilian-born American actress most widely
        known for roles in several American science fiction television shows: as Inara
        Serra in the series Firefly; as Adria in the series Stargate SG-1; and as
        Anna in the 2009 version of the series V.\n\nBaccarin was born in Rio de Janeiro,
        Brazil. Her mother is Brazilian stage and TV actress Vera Setta, and her father
        is Italian journalist Fernando Baccarin. When she was 7, Baccarin moved with
        her family to Greenwich Village, New York, as her father was transferred to
        Globo TV''s headquarters in the United States, working as editor. Baccarin
        attended Public School 41 and New York City Lab School for Collaborative Studies,
        where she and Claire Danes were classmates. She later attended the Fiorello
        H. LaGuardia High School of Music & Art and Performing Arts before she entered
        the theater program at Juilliard. Baccarin landed her first movie role in
        the improvised fashion world comedy Perfume (2001).","birthplace":"Rio de
        Janeiro, Rio de Janeiro, Brazil","social_ids":{"twitter":"missmorenab","facebook":"morenabaccarin","instagram":"morenabaccarin","wikipedia":"Morena_Baccarin"},"updated_at":"2026-05-09T08:12:33.000Z","known_for_department":"acting"},"images":{"headshot":["media.trakt.tv/images/people/000/431/157/headshots/medium/a8a248e9ed.jpg.webp"]}},{"character":"Ajax","characters":["Ajax"],"person":{"ids":{"imdb":"nm4534098","slug":"ed-skrein","tmdb":1047649,"trakt":456186},"name":"Ed
        Skrein","death":null,"gender":"male","height":185,"images":{"fanart":["media.trakt.tv/images/people/000/456/186/fanarts/medium/6d952375cf.jpg.webp"],"headshot":["media.trakt.tv/images/people/000/456/186/headshots/medium/f7cd034211.jpg.webp"]},"birthday":"1983-03-29","homepage":null,"biography":"Edward
        George Skrein (born March 29, 1983) is an English actor, filmmaker, and rapper.
        Skrein made his acting debut in Plan B''s short film Michelle. He got his
        first lead role in Plan B''s Ill Manors.  Skrein portrayed Daario Naharis
        in the third season of the television series Game of Thrones. However, in
        the fourth season of the series, he had been replaced by Dutch actor Michiel
        Huisman. Skrein states that \"behind the scenes politics\" had forced him
        to leave the show. In 2014, Skrein was cast in The Transporter: Refueled,
        replacing Jason Statham as the lead. Though the film was critically panned,
        his performance was praised. In 2016, Skrein played the lead villain, Ajax,
        in the blockbuster action film Deadpool.","birthplace":"Camden, London, England,
        UK","social_ids":{"twitter":"edskrein","facebook":"EdSkrein","instagram":"edskrein","wikipedia":"Ed_Skrein"},"updated_at":"2026-05-10T08:14:30.000Z","known_for_department":"acting"},"images":{"headshot":["media.trakt.tv/images/people/000/456/186/headshots/medium/f7cd034211.jpg.webp"]}},{"character":"Weasel","characters":["Weasel"],"person":{"ids":{"imdb":"nm2554352","slug":"t-j-miller","tmdb":51990,"trakt":421412},"name":"T.J.
        Miller","death":null,"gender":"male","height":188,"images":{"fanart":["media.trakt.tv/images/people/000/421/412/fanarts/medium/d3be8ebc1c.jpg.webp"],"headshot":["media.trakt.tv/images/people/000/421/412/headshots/medium/8b55bcbc93.jpg.webp"]},"birthday":"1981-06-04","homepage":"https://tjmillerdoesnothaveawebsite.com/","biography":"Todd
        Joseph \"T.J.\" Miller (born June 4, 1981) is an American actor and stand-up
        comedian.\n\nAfter college, Miller moved to Chicago and began to perform improv
        and stand-up comedy. He toured with The Second City for two years. In 2008,
        he was named one of Variety''s \"10 Comics To Watch.\"\n\nHe portrayed Marmaduke
        Brooker in Carpoolers on ABC (2007–2008).\n\nIn 2008, he made his film acting
        debut in Cloverfield in which he only appeared onscreen for a few minutes,
        but his voice was heard in almost every scene as the person who videotaped
        most of the events depicted. In 2009, he played Cessna Jim in The Goods: Live
        Hard, Sell Hard and the grindcore musician Rory in Mike Judge''s comedy Extract.
        In 2010, he co-starred in She''s Out of My League as Stainer, played Brian
        the Concierge in Get Him to the Greek and had a supporting role in Unstoppable.
        From 2010 to 2014, he voiced Tuffnut Thorston in the first three How to Train
        Your Dragon films.\n\nIn 2010, he played Ranger Jones in the live-action animated
        film Yogi Bear, and he also played Dan in Gulliver''s Travels. In 2011, he
        appeared in the film Our Idiot Brother and, in 2012, he had a cameo as administrative
        personnel for Rolling Stone in the musical film Rock of Ages.\n\nOn 12/13/2010,
        10/28/2011, and 6/14/2012, he performed stand-up on Conan. On November 15,
        2011, his stand-up special No Real Reason premiered on Comedy Central. In
        2011, he hosted a special called Mash Up, which was picked up in 2012 for
        a full season by Comedy Central. He also appeared frequently as a member of
        the \"round table\" on Chelsea Lately.\n\nIn 2012, he voiced Robbie Valentino
        on the Disney channel cartoon Gravity Falls. He also voiced Gorburger, a giant
        blue monster talk show host, on The Gorburger Show, which originally aired
        on Funny or Die and YouTube for 2 seasons in 2012–13, then on Comedy Central for
        a 3rd season in 2017.  In 2013, he co-starred in the Fox TV series The Goodwin
        Games as Jimmy Goodwin. In 2014, he was in Transformers: Age of Extinction
        and he voiced the character of Fred in the superhero CGI film Big Hero 6.
        He voiced Augie in the 2015 animated film Hell and Back. In 2015, he was part
        of Funny or Die''s Oddball Comedy and Curiosity Festival, a touring show which
        included Amy Schumer, Aziz Ansari, and other comics.\n\nFrom 2014 to 2017,
        he starred as Erlich Bachman in the HBO sitcom Silicon Valley for which he
        won the Critics'' Choice Television Award for Best Supporting Actor in a Comedy
        Series in 2015. In 2016, he starred in the movie Search Party with Adam Pally
        and the movie Office Christmas Party.\n\nOn June 17, 2017, HBO premiered his
        hour-long stand-up special, T.J. Miller: Meticulously Ridiculous, which was
        filmed in Miller''s native Denver at the end of his 2016 Meticulously Ridiculous
        Tour. In October 2017, Miller began his \"Touring In Perpetuity Tour\", a
        self described \"One Man Philosophy Circus.\"\n\nIn 2018, he played the role
        of I-R0K in the film Ready Player One, directed by Steven Spielberg. As a
        commercial actor, he voiced a talking ball of mucus in commercials for Mucinex
        and starred as Greg the Genie in a promo campaign for Slim Jim meat snacks.\n\nHe
        hosted a podcast with friend and fellow comedian Cash Levy, titled Cashing
        in With TJ Miller, which began airing in March 2012 on the Nerdist Network.
        He is also a frequent guest on Doug Benson''s podcast Doug Loves Movies.","birthplace":"Denver,
        Colorado, USA","social_ids":{"twitter":"nottjmiller","facebook":"nottjmiller","instagram":"teenagemillionaire","wikipedia":"T.J._Miller"},"updated_at":"2026-05-12T21:47:51.000Z","known_for_department":"acting"},"images":{"headshot":["media.trakt.tv/images/people/000/421/412/headshots/medium/8b55bcbc93.jpg.webp"]}},{"character":"Angel
