        Lee (born Stanley Martin Lieber /ˈliːbər/; December 28, 1922–November 12,
        2018) was an American comic book writer, editor, publisher, and producer.
        He rose through the ranks of a family-run business called Timely Comics, which
        later became Marvel Comics. He was Marvel''s primary creative leader for two
        decades, expanding it from a small publishing house division to a multimedia
        corporation that dominated the comics and film industries.\n\nIn collaboration
        with others at Marvel—particularly co-writers and artists Jack Kirby and Steve
        Ditko—he co-created iconic characters, including Spider-Man, the X-Men, Iron
        Man, Thor, the Hulk, Ant-Man, the Wasp, the Fantastic Four, Black Panther,
        Daredevil, Doctor Strange, the Scarlet Witch, and Black Widow. These and other
        characters'' introductions in the 1960s pioneered a more naturalistic approach
        in superhero comics. In the 1970s, Lee challenged the restrictions of the
        Comics Code Authority, indirectly leading to changes in its policies. In the
        1980s, he pursued the development of Marvel properties in other media, with
        mixed results.\n\nFollowing his retirement from Marvel in the 1990s, Lee remained
        a public figurehead for the company. He frequently made cameo appearances
        in films and television shows based on Marvel properties, on which he received
        an executive producer credit, which allowed him to become the person with
        the highest-grossing film total ever. He continued independent creative ventures
        until his death, aged 95, in 2018. Lee was inducted into the comic book industry''s
        Will Eisner Award Hall of Fame in 1994 and the Jack Kirby Hall of Fame in
        1995. He received the NEA''s National Medal of Arts in 2008.\n\nDescription
        above from the Wikipedia article Stan Lee, licensed under CC-BY-SA, full list
        of contributors on Wikipedia.","birthplace":"New York City, New York, USA","social_ids":{"twitter":"TheRealStanLee","facebook":"realstanlee","instagram":"therealstanlee","wikipedia":"Stan_Lee"},"updated_at":"2026-05-19T08:33:01.000Z","known_for_department":"writing"},"images":{"headshot":["media.trakt.tv/images/people/000/016/093/headshots/medium/7d53a074ab.jpg.webp"]}},{"character":"No5
