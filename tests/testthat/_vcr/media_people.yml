        on the CBS sitcom Mom, and as a gay man named Andy in the fifth season of Married
        With Children. He is noted for being the first-ever guest star on The Simpsons.\n\nAmong
        his film credits are C.H.U.D. (1984), Raising Arizona (1987), The Wizard (1989)
        as Jimmy''s stepfather Mr. Bateman, National Lampoon''s Christmas Vacation
        (1989), L.A. Story (1991), Addams Family Values (1993), and Drop Dead Gorgeous (1999).
        On television, he was a regular on The Tracey Ullman Show, voiced Roy in the
        series Dinosaurs, and played recurring roles such as Chandler''s boss on Friends,
        dentist Vic Schweiber on Freaks and Geeks, Doug and Deacon''s boss in The
