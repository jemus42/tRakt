        Kyshkovych is a Ukrainian-born Canadian stunt performer and fight coordinator.
        Originally from Yalta, Ukraine, Kyshkovych built his career in Vancouver,
        British Columbia.\n\nKyshkovych is especially recognised for his work in Marvel
