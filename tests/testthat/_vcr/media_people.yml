        to leave the show. In 2014, Skrein was cast in The Transporter: Refueled,
        replacing Jason Statham as the lead. Though the film was critically panned,
        his performance was praised. In 2016, Skrein played the lead villain, Ajax,
        in the blockbuster action film Deadpool.","birthplace":"Camden, London, England","social_ids":{"twitter":"edskrein","facebook":"EdSkrein","instagram":"edskrein","wikipedia":"Ed_Skrein"},"updated_at":"2026-02-11T15:32:14.000Z","known_for_department":"acting"},"images":{"headshot":["media.trakt.tv/images/people/000/456/186/headshots/medium/f7cd034211.jpg.webp"]}},{"character":"Weasel","characters":["Weasel"],"person":{"ids":{"imdb":"nm2554352","slug":"t-j-miller","tmdb":51990,"trakt":421412},"name":"T.J.
