        Okoye","death":null,"gender":"female","height":170,"images":{"fanart":[],"headshot":["media.trakt.tv/images/people/000/562/943/headshots/medium/16cdfe8efc.jpg.webp"]},"birthday":"1985-05-26","homepage":null,"biography":"Rochelle
        Okoye is a world-renowned Hollywood stunt woman, actress, best-selling author,
        motivational speaker, and trauma-informed breath work facilitator certified
        through SOMA Breath. With a powerful blend of elite athleticism, academic
        excellence, and deep personal transformation, Rochelle has built a multifaceted
        career rooted in resilience and empowerment.\n\nBorn in Winnipeg, Manitoba,
        Rochelle began her gymnastics training at the age of two. At seven, her family
        relocated to the UK, where her father completed his PhD at Cambridge and Oxford
        Universities. By age 10, she was competing internationally for Great Britain,
        becoming the British National Gymnastics Champion in 1996-a title she held
        for three consecutive years. She was also twice nominated and awarded as England''s
        Top Sports Person Under 13. At 14, the BBC produced a one-hour documentary
        titled Going for Gold, chronicling her pursuit of a spot on the 2000 Olympic
        team.\n\nThat dream was cut short when the International Gymnastics Federation
        (FIG) raised the age requirement for Olympic competition to 16-leaving Rochelle
        ineligible by just one year. This pivotal moment redirected the course of
        her athletic journey.\n\nAn academic high achiever, Rochelle skipped a grade
        and graduated from both high school and university a year early. She earned
        her B.Sc. in Psychology from the University of Northern British Columbia and
        went on to work with children and youth navigating developmental, cognitive,
        and behavioral challenges.\n\nDriven by a lifelong desire to push physical
        and mental limits, Rochelle transitioned into martial arts-training and competing
        in Brazilian Jiu-Jitsu and Muay Thai-she also embarked on a successful amateur
        and professional boxing career. In 2008, she made history as the first female
        boxer to compete in a professional fight in British Columbia. During this
        time, she also earned her diploma in personal training and later went on to
        become the co-founder of the acclaimed Tristar Vancouver Martial Arts gym.\n\nRochelle''s
        physical discipline seamlessly translated into a thriving career as a Hollywood
        stunt performer and actress. Having overcome a life marked by adversity, trauma,
        and profound personal challenges, she has immersed herself in various healing
        modalities to rise, reclaim her power, and give back. Today, she uses her
        platform to empower others through her best-selling book With Every Damn Brick,
        her powerful TEDx Talk How to Turn Your Pain Into Power, and her work as a
        motivational speaker and breath work facilitator. Her story is a testament
        to transformation, and she now dedicates her life to helping others do the
        same-teaching that no matter how heavy the past, it can be alchemized into
        strength, purpose, and impact.","birthplace":"Winnipeg, Manitoba, Canada","social_ids":{"twitter":"","facebook":null,"instagram":"rochelle_okoye","wikipedia":null},"updated_at":"2026-04-01T03:34:55.000Z","known_for_department":"crew"},"images":{"headshot":["media.trakt.tv/images/people/000/562/943/headshots/medium/16cdfe8efc.jpg.webp"]}},{"job":"Armorer","jobs":["Armorer"],"person":{"ids":{"imdb":"nm0288537","slug":"rob-fournier","tmdb":1558713,"trakt":565087},"name":"Rob
