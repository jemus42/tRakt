        Wikipedia, the free encyclopedia\n\nJohn Henry Lawlor III (June 5, 1941 –
        February 13, 2025) was an American actor and assistant director.\n\nEarly
        life\n\nLawlor was born on June 5, 1941, in Troy, New York, but spent much
        of his early life in Boulder, Colorado, where his mother was a teacher of
        special needs children at Casey Jr. High School. In the late-1960s, he worked
        as a AmeriCorps Seniors volunteer trainer in Denver.\n\nCareer\n\nHis best
        known roles were Supervisor Leonard Marsh on the television series Phyllis
        from 1976 to 1977, and later of Headmaster Steven Bradley on the television
        series The Facts of Life from 1979 to 1980. The name Steven Bradley was likely
        meant as a tribute to Steve Bradley in Boulder, a friend and one-time manager
        of the Winter Park ski area.\n\nHe also guest-starred in L.A. Law, Knots Landing,
        Mr. Belvedere, Barney Miller, The Rockford Files, Ellery Queen, Baa Baa Black
        Sheep, and Alice. He played the locksmith exhorted by Skylar White in Breaking
        Bad.\n\nHe appeared in the movies National Lampoon''s Movie Madness (1982),
        S.O.B. (1981), Billy Jack Goes to Washington (1977), The Gumball Rally (1976),
        Wyatt Earp (1994) and Mr. Fixit (1988).\n\nIn a 1980s TV commercial for Malt-O-Meal
        hot cereal, he played a father telling his son''s invisible friend that Malt-O-Meal
        was, \"Good stuff, Maynard!\" a line which became a popular phrase.\n\nPersonal
        life and death\n\nLawlor was divorced from Tantoo Cardinal, with whom he had
        two children. He also had four other children.\n\nLawlor died in Albuquerque,
        New Mexico, on February 13, 2025, at the age of 83.  CLR","birthplace":"Albany,
